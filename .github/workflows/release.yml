name: Release

# Publish-only / verify-only workflow (issue #9).
#
# Why this does NOT build:
#   OutlookAI is a VSTO add-in. Its csproj resolves the Office/Outlook COM
#   type libraries via <COMReference> GUIDs that only exist on a machine with
#   Microsoft Outlook installed. The windows-2025 GitHub runner image has no
#   Office, so MSBuild dies with CS0234 on every Microsoft.Office.Core.* /
#   Microsoft.Office.Interop.Outlook.* type. Installing the VSTO build
#   workload is not the same as installing Outlook, and the NuGet-PIA path is
#   unproven for runtime-identical .vsto loading. So the build stays local.
#
# The actual release flow (see Deploy/README.txt and handoff.md "Publish a
# release"):
#   1. git tag -a vX.Y.Z -m "..."   &&   git push origin vX.Y.Z   (fires THIS)
#   2. .\Deploy\Make-ReleaseZip.ps1 -Tag vX.Y.Z -OutDir out        (local build)
#   3. gh release create vX.Y.Z out\...zip out\...zip.sha256        (publish)
#
# This workflow waits for that release to appear, then VERIFIES it is
# well-formed: both expected assets present, and the ZIP's SHA256 matches its
# .sha256 sidecar. It goes GREEN when you have published a correct release and
# RED if an asset is missing, the hash disagrees, or you never published. No
# more "doomed build run you ignore" — a red check now means a real problem.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Verify the published release is well-formed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          ZIP="OutlookAI-${TAG}-RDS-Deploy.zip"
          SHA="${ZIP}.sha256"

          # The release is created locally by `gh release create` AFTER the tag
          # push that triggered this run, so it may not exist yet. Poll for it.
          echo "Waiting for release ${TAG} to be published..."
          found=""
          for attempt in $(seq 1 30); do
            if gh release view "${TAG}" >/dev/null 2>&1; then
              found="yes"
              echo "Release ${TAG} found (attempt ${attempt})."
              break
            fi
            echo "  not yet (attempt ${attempt}/30); sleeping 20s..."
            sleep 20
          done

          if [ -z "${found}" ]; then
            echo "::error::Release ${TAG} was never published within 10 minutes."
            echo "::error::Run: .\\Deploy\\Make-ReleaseZip.ps1 -Tag ${TAG} -OutDir out; then gh release create ${TAG} out\\${ZIP} out\\${SHA}"
            exit 1
          fi

          # Both expected assets must be attached.
          assets="$(gh release view "${TAG}" --json assets --jq '.assets[].name')"
          echo "Attached assets:"
          echo "${assets}" | sed 's/^/  - /'

          for required in "${ZIP}" "${SHA}"; do
            if ! grep -qxF "${required}" <<< "${assets}"; then
              echo "::error::Release ${TAG} is missing required asset: ${required}"
              exit 1
            fi
          done

          # Download both and verify the ZIP hashes to the sidecar value.
          workdir="$(mktemp -d)"
          gh release download "${TAG}" --dir "${workdir}" --pattern "${ZIP}" --pattern "${SHA}"

          expected="$(tr -d '[:space:]' < "${workdir}/${SHA}" | tr 'A-F' 'a-f')"
          actual="$(sha256sum "${workdir}/${ZIP}" | awk '{print $1}' | tr 'A-F' 'a-f')"

          echo "Expected SHA256 (sidecar): ${expected}"
          echo "Actual   SHA256 (zip)    : ${actual}"

          if [ -z "${expected}" ]; then
            echo "::error::Sidecar ${SHA} is empty."
            exit 1
          fi
          if [ "${expected}" != "${actual}" ]; then
            echo "::error::SHA256 mismatch for ${ZIP} — the sidecar does not match the uploaded ZIP."
            exit 1
          fi

          echo "Release ${TAG} is well-formed: both assets present and SHA256 verified."
